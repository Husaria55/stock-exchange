name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: stockuser
          POSTGRES_PASSWORD: stockpassword
          POSTGRES_DB: stockexchange
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26.x' 

    - name: Initialize Database Schema
      env:
        PGPASSWORD: stockpassword
      run: |
        sudo apt-get update && sudo apt-get install -y postgresql-client
        psql -h localhost -U stockuser -d stockexchange -f ./migrations/000001_init.up.sql

    - name: Download Go dependencies
      run: go mod download

    - name: Run Tests (Unit & Integration)
      env:
        RUN_INTEGRATION_TESTS: 1
      run: go test -v -race ./...

    - name: Verify Docker Build
      run: docker build -t stock-exchange-api:test .