events {
    worker_connections 1024;
}

http {
    upstream go_api {
        server api:8080; 
    }

    server {
        listen 80;

        location / {
            proxy_pass http://go_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_connect_timeout 2s;
            proxy_next_upstream error timeout http_500;
        }
    }
}